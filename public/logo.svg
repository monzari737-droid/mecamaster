<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond blanc avec bordure orange subtile -->
  <rect width="200" height="200" rx="40" fill="white"/>
  <rect x="2" y="2" width="196" height="196" rx="38" stroke="#FF8C42" stroke-width="4"/>
  
  <!-- Premier M stylisé -->
  <path d="M35 140V60L65 100L95 60V140" 
        stroke="#FF8C42" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Deuxième M stylisé connecté -->
  <path d="M105 140V60L135 100L165 60V140" 
        stroke="#FF6B35" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Point de connexion entre les deux M -->
  <circle cx="100" cy="100" r="8" fill="#FF8C42"/>
  
  <!-- Ombre douce -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF8C42" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#gradient)" filter="url(#shadow)" style="mix-blend-mode: overlay;" opacity="0.1"/>
</svg>
